name: bet_kids
description: BetKids - A colorful kids casino game for educational purposes
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase Backend
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.2
  cloud_firestore: ^5.4.4
  firebase_messaging: ^15.1.3

  # Hardware - Accelerometer (Roulette shake)
  sensors_plus: ^4.0.2

  # Hardware - Microphone (Cigarro screen)
  record: ^7.1.0
  path_provider: ^2.1.5

  # Native Sharing
  share_plus: ^13.1.0

  # Local & Push Notifications
  flutter_local_notifications: ^17.2.3

  # Networking (Trivia API)
  http: ^1.2.0

  # State Management
  provider: ^6.1.2

  # Animations
  flutter_animate: ^4.5.0
  confetti: ^0.7.0

  # Typography
  google_fonts: ^6.2.1

  # Local Storage
  shared_preferences: ^2.2.2
  sqflite: ^2.3.2
  path: ^1.9.0

  # IA local (host de cassino que incentiva apostar mais)
  flutter_gemma: ^0.16.5

  # Utilities
  intl: ^0.19.0
  uuid: ^4.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
